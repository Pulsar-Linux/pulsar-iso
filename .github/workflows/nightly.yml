name: Nightly Build

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm --needed \
          archiso \
          git \
          squashfs-tools \
          wget \
          imagemagick \
          sudo \
          base-devel \
          python-pip \
          rsync \
          openssh

    - name: Create build user
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chown -R builder:builder .

    - name: Prepare
      run: sudo -u builder ./prepare.sh

    - name: Build ISO
      run: |
        ./mkarchiso -v "."
        mv out/*.iso out/$(basename out/*.iso | sed 's/-x86_64/-x86_64-nightly/')

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: Antergos-NeXT-Nightly
        path: out/

    - name: Upload to SourceForge
      env:
        SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
      run: |
        mkdir -p /root/.ssh
        echo "$SF_SSH_KEY" > /root/.ssh/id_ed25519
        chmod 600 /root/.ssh/id_ed25519
        ssh-keyscan -t rsa,ed25519 frs.sourceforge.net >> /root/.ssh/known_hosts 2>/dev/null || true
        chmod 644 /root/.ssh/known_hosts

        # Find ISO
        ISO=$(ls out/*-nightly*.iso | head -1)
        REMOTE_DIR="/home/frs/project/antergos-next/nightly"

        # Validate ISO exists
        if [[ -z "$ISO" || ! -f "$ISO" ]]; then
          echo "ERROR: No ISO found!"
          exit 1
        fi

        # Check ISO size
        SIZE=$(stat -c%s "$ISO")
        if [[ $SIZE -lt 524288000 ]]; then
          echo "WARNING: ISO smaller than expected (${SIZE} bytes), checking..."
          if file "$ISO" | grep -q "ISO 9660\|UDF"; then
            echo "ISO appears valid, proceeding..."
          else
            echo "ERROR: ISO is corrupted!"
            exit 1
          fi
        fi

        # Create README
        DATE=$(date +%Y.%m.%d)
        echo "# ⚠️ Antergos NeXT Nightly ISO" > README.md
        echo "" >> README.md
        echo "## ⚠️ WARNING - NOT FOR PRODUCTION USE" >> README.md
        echo "" >> README.md
        echo "**This is a NIGHTLY build. Use at your own risk!**" >> README.md
        echo "" >> README.md
        echo "### What is Nightly?" >> README.md
        echo "- Built automatically every day from the latest master branch" >> README.md
        echo "- May or may NOT include new Cnchi GTK4 from cnchi-dev branch - it is a GAMBLE!" >> README.md
        echo "- May contain untested changes or broken features" >> README.md
        echo "- NOT recommended for production systems" >> README.md
        echo "" >> README.md
        echo "### NO WARRANTY" >> README.md
        echo "```" >> README.md
        echo "THIS SOFTWARE IS PROVIDED \"AS IS\" WITHOUT WARRANTY OF ANY KIND." >> README.md
        echo "THERE ARE NO EXPRESS OR IMPLIED WARRANTIES INCLUDING, BUT NOT LIMITED TO," >> README.md
        echo "IMPLIED WARRANTIES OF MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE." >> README.md
        echo "YOU ASSUME ALL RISK FOR ANY ISSUES OR DAMAGE." >> README.md
        echo "```" >> README.md
        echo "" >> README.md
        echo "### Known Issues (may include):" >> README.md
        echo "- Cnchi installer may give traceback errors" >> README.md
        echo "- NEW Cnchi GTK4 from cnchi-dev branch (may be unstable)" >> README.md
        echo "- Syslinux/bootloader errors" >> README.md
        echo "- Broken desktop environments" >> README.md
        echo "- Missing or broken packages" >> README.md
        echo "- Any other bug that slipped in today" >> README.md
        echo "" >> README.md
        echo "### Issues" >> README.md
        echo "DO NOT report issues for nightly builds - fix them yourself or wait for the next stable release." >> README.md
        echo "" >> README.md
        echo "### Build Info" >> README.md
        echo "- **Date**: ${DATE}" >> README.md
        echo "- **Type**: nightly build" >> README.md
        echo "- **Status**: UNTESTED" >> README.md
        echo "" >> README.md
        echo "## Installation (at your own risk!)" >> README.md
        echo "1. Boot from ISO" >> README.md
        echo "2. Select desktop environment" >> README.md
        echo "3. Run Cnchi installer" >> README.md
        echo "4. Do not come crying to us if it breaks" >> README.md
        echo "" >> README.md
        echo "## Source" >> README.md
        echo "- ISO Build: https://github.com/Antergos-NeXT/Antergos-NeXT-ISO" >> README.md
        echo "- Cnchi: https://github.com/Antergos-NeXT/Cnchi" >> README.md

        # Upload to nightly folder (overwrite allowed)
        rsync -avP -e "ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no" --delete "$ISO" README.md "antergos-txen@frs.sourceforge.net:${REMOTE_DIR}/"
        echo "Uploaded nightly to ${REMOTE_DIR}"