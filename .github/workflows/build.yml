name: Build ISO

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm --needed \
          archiso \
          git \
          squashfs-tools \
          wget \
          imagemagick \
          sudo \
          base-devel \
          python-pip \
          rsync \
          openssh

    - name: Create build user
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chown -R builder:builder .

    - name: Prepare
      run: sudo -u builder ./prepare.sh

    - name: Build ISO
      run: ./mkarchiso -v "."

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: Antergos-NeXT-ISO
        path: out/

    - name: Upload to SourceForge
      if: github.ref == 'refs/heads/master'
      env:
        SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        printf '%s' "$SF_SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -t rsa,ed25519 frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null || true
        chmod 644 ~/.ssh/known_hosts

        # Configure SSH to accept new hosts
        cat >> ~/.ssh/config << 'EOF'
Host frs.sourceforge.net
    StrictHostKeyChecking accept-new
    UserKnownHostsFile ~/.ssh/known_hosts
EOF
        chmod 600 ~/.ssh/config

        # Find ISO
        ISO=$(ls out/*.iso | head -1)
        DATE=$(date +%Y.%m.%d)
        REMOTE_DIR="/home/frs/project/antergos-next/${DATE}"

        # Validate ISO exists
        if [[ -z "$ISO" || ! -f "$ISO" ]]; then
          echo "ERROR: No ISO found!"
          exit 1
        fi

        # Check ISO size (must be > 500MB)
        SIZE=$(stat -c%s "$ISO")
        if [[ $SIZE -lt 524288000 ]]; then
          echo "WARNING: ISO smaller than expected (${SIZE} bytes), checking..."
          if file "$ISO" | grep -q "ISO 9660\|UDF"; then
            echo "ISO appears valid, proceeding..."
          else
            echo "ERROR: ISO is corrupted!"
            exit 1
          fi
        fi

        # Check if ISO already exists
        if ssh antergos-txen@frs.sourceforge.net ls "${REMOTE_DIR}/"*.iso &>/dev/null; then
          echo "ISO already exists in ${DATE}, skipping upload"
        else
          # Create README
          echo "# Antergos NeXT Live ISO" > README.md
          echo "" >> README.md
          echo "## Build Info" >> README.md
          echo "- **Date**: ${DATE}" >> README.md
          echo "- **Version**: rolling" >> README.md
          echo "- **Architecture**: x86_64" >> README.md
          echo "" >> README.md
          echo "## Desktop Environments" >> README.md
          echo "- KDE Plasma (default)" >> README.md
          echo "- GNOME, XFCE, Cinnamon, and more..." >> README.md
          echo "" >> README.md
          echo "## Installation" >> README.md
          echo "1. Boot from ISO" >> README.md
          echo "2. Select desktop environment" >> README.md
          echo "3. Run Cnchi installer" >> README.md
          echo "" >> README.md
          echo "## Issues" >> README.md
          echo "Report at: https://github.com/Antergos-NeXT/Antergos-NeXT-ISO/issues" >> README.md
          echo "" >> README.md
          echo "## Source" >> README.md
          echo "- ISO Build: https://github.com/Antergos-NeXT/Antergos-NeXT-ISO" >> README.md
          echo "- Cnchi: https://github.com/Antergos-NeXT/Cnchi" >> README.md

          # Upload ISO + README
          rsync -avP "$ISO" README.md "antergos-txen@frs.sourceforge.net:${REMOTE_DIR}/"
          echo "Uploaded to ${REMOTE_DIR}"
        fi
